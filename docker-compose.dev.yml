# 本地开发用 — 只启动基础设施（postgres + redis）
# new-api 本地编译直接运行，无需 Docker build

services:
  redis:
    image: redis:latest
    container_name: qns-redis
    restart: always
    ports:
      - "6380:6379"

  postgres:
    image: postgres:15
    container_name: qns-postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    ports:
      - "5433:5432"
    volumes:
      - qns_pg_data:/var/lib/postgresql/data

volumes:
  qns_pg_data:
